<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Flash Cards</title>

    <meta name="author" content="Dorothy Mawi" />
    <meta
      name="description"
      content="A flashcard study app that helps students organize decks and review concepts."
    />
    <meta
      name="keywords"
      content="flashcards, study aids, learning materials, education, decks, studying"
    />

    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./assets/css/index.css" />
  </head>

  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a href="#home" class="header__link">Flash Cards</a>
      </h1>

      <nav class="nav">
        <ul class="nav__links">
          <li><a href="#home" class="nav__link">My Decks</a></li>
          <li><a href="#about" class="nav__link">About</a></li>
        </ul>
      </nav>
    </header>

    <main class="page__main-content">
      <section class="decks" id="home">
        <h2 class="decks__title">My Decks</h2>

        <div class="decks__cards">
          <ul class="decks__list"></ul>

          <button class="decks__new-deck-btn" type="button">
            + New Deck
          </button>
        </div>
      </section>

      <section class="deck-view" id="deck-view">
        <div class="deck-view__header">
          <h2 class="deck-view__title"></h2>

          <a class="deck-view__practice-btn" href="#">Practice</a>
        </div>

        <div class="deck-view__cards">
          <ul class="deck-view__list"></ul>

          <button class="deck-view__new-card-btn" type="button">
            + New Card
          </button>
        </div>
      </section>

      <section class="new-deck-view" id="new-deck-view">
        <h2 class="new-deck-view__title">New Deck</h2>

        <form class="new-deck-view__form" id="new-deck-form">
          <fieldset class="new-deck-view__fieldset">
            <legend class="new-deck-view__legend">Choose a deck color</legend>

            <ul class="new-deck-view__color-list">
              <li class="new-deck-view__color-item">
                <input
                  class="new-deck-view__radio"
                  type="radio"
                  id="green"
                  name="deck-color"
                  value="#64d583"
                  aria-label="green"
                  checked
                />
                <label
                  class="new-deck-view__color-label new-deck-view__color-label_color_green"
                  for="green"
                ></label>
              </li>

              <li class="new-deck-view__color-item">
                <input
                  class="new-deck-view__radio"
                  type="radio"
                  id="blue"
                  name="deck-color"
                  value="#91a8f9"
                  aria-label="blue"
                />
                <label
                  class="new-deck-view__color-label new-deck-view__color-label_color_blue"
                  for="blue"
                ></label>
              </li>

              <li class="new-deck-view__color-item">
                <input
                  class="new-deck-view__radio"
                  type="radio"
                  id="pink"
                  name="deck-color"
                  value="#ee92d7"
                  aria-label="pink"
                />
                <label
                  class="new-deck-view__color-label new-deck-view__color-label_color_pink"
                  for="pink"
                ></label>
              </li>

              <li class="new-deck-view__color-item">
                <input
                  class="new-deck-view__radio"
                  type="radio"
                  id="purple"
                  name="deck-color"
                  value="#aa8ef0"
                  aria-label="purple"
                />
                <label
                  class="new-deck-view__color-label new-deck-view__color-label_color_purple"
                  for="purple"
                ></label>
              </li>

              <li class="new-deck-view__color-item">
                <input
                  class="new-deck-view__radio"
                  type="radio"
                  id="orange"
                  name="deck-color"
                  value="#ee955e"
                  aria-label="orange"
                />
                <label
                  class="new-deck-view__color-label new-deck-view__color-label_color_orange"
                  for="orange"
                ></label>
              </li>

              <li class="new-deck-view__color-item">
                <input
                  class="new-deck-view__radio"
                  type="radio"
                  id="yellow"
                  name="deck-color"
                  value="#f5d770"
                  aria-label="yellow"
                />
                <label
                  class="new-deck-view__color-label new-deck-view__color-label_color_yellow"
                  for="yellow"
                ></label>
              </li>
            </ul>
          </fieldset>

          <label class="new-deck-view__label" for="deck-json">
            Deck JSON
            <textarea
              class="new-deck-view__textarea"
              id="deck-json"
              name="deck-json"
            ></textarea>
          </label>

          <button class="new-deck-view__submit-btn" type="submit" disabled>
            Create Deck
          </button>
        </form>
      </section>

      <section class="not-found" id="not-found">
        <h2 class="not-found__title">404 Not Found</h2>
        <p class="not-found__text">Page not found.</p>
      </section>

      <section class="carousel" id="carousel">
        <h2 class="carousel__title"></h2>

        <div class="carousel__grid">
          <button
            class="carousel__btn carousel__btn_type_left"
            type="button"
            aria-label="Previous card"
          ></button>

          <div class="carousel__card">
            <p class="carousel__card-text"></p>
          </div>

          <button
            class="carousel__btn carousel__btn_type_right"
            type="button"
            aria-label="Next card"
          ></button>

          <button
            class="carousel__btn carousel__btn_type_flip"
            type="button"
            aria-label="Flip card"
          ></button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__text">&copy; 2026 Dorothy Mawi</p>
    </footer>

    <div class="modal" id="error-modal">
      <div class="modal__content">
        <h2 class="modal__title">Something went wrong</h2>
        <p class="modal__error"></p>
        <button class="modal__close-btn" type="button">Dismiss</button>
      </div>
    </div>

    <template id="deck-template">
      <li class="deck">
        <a class="deck__link" href="#"></a>

        <h3 class="deck__title"></h3>

        <div class="deck__row">
          <p class="deck__count"></p>
          <button
            class="deck__delete-btn"
            type="button"
            aria-label="Delete this deck"
          ></button>
        </div>
      </li>
    </template>

    <template id="card-template">
      <li class="card">
        <p class="card__text"></p>

        <div class="card__buttons">
          <button
            class="card__flip-btn"
            type="button"
            aria-label="Flip card"
          ></button>

          <button
            class="card__delete-btn"
            type="button"
            aria-label="Delete this card"
          ></button>
        </div>
      </li>
    </template>

    <script type="module" src="./assets/js/index.js"></script>
  </body>
</html>
